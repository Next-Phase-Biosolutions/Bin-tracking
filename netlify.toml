[build]
  # Tell Netlify to generate the database client first via pnpm, then build the frontend
  command = "pnpm db:generate && pnpm --filter=@bin-tracker/web build"
  
  # Tell Netlify where the compiled frontend files end up
  publish = "apps/web/dist"
  
  # Tell Netlify where to run the build command from
  base = "/"

[[redirects]]
  # This ensures React Router handles all page refreshing correctly
  from = "/*"
  to = "/index.html"
  status = 200
